<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YEDAŞ Hat Koridoru — Bitki Örtüsü Risk Haritası</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #0E1412;
    --panel: #161E1B;
    --panel-2: #1C2521;
    --border: #26302B;
    --text: #E7ECE9;
    --muted: #8CA096;
    --risk-high: #FF4D5E;
    --risk-medium: #FFB020;
    --risk-low: #2FE6A0;
    --risk-unknown: #8FA8B8;
    --accent: #35C97C;
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .mono{ font-family: 'IBM Plex Mono', monospace; }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: relative;
    z-index: 2;
  }
  header .title-block h1{
    font-size: 16px;
    font-weight: 600;
    margin:0;
    letter-spacing: 0.01em;
  }
  header .title-block p{
    margin: 2px 0 0;
    font-size: 12px;
    color: var(--muted);
  }
  .scan-line{
    position:absolute;
    left:0; right:0; top:0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 4s linear infinite;
    opacity: 0.7;
  }
  @media (prefers-reduced-motion: reduce){ .scan-line{ animation: none; } }
  @keyframes scan{
    0%{ transform: translateX(-100%); }
    100%{ transform: translateX(100%); }
  }

  .status-pill{
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    display:flex; align-items:center; gap:6px;
  }
  .dot{ width:7px; height:7px; border-radius:50%; background: var(--accent); }

  main{
    flex:1;
    display:flex;
    min-height:0;
  }
  #map{
    flex:1;
    background: var(--bg);
  }
  aside{
    width: 340px;
    flex-shrink:0;
    border-left: 1px solid var(--border);
    background: var(--panel);
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .legend{
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }
  .legend h2{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 10px;
    font-weight: 600;
  }
  .legend-row{
    display:flex; align-items:center; gap:8px;
    font-size: 12.5px;
    margin-bottom: 6px;
    color: var(--text);
  }
  .swatch{ width:11px; height:11px; border-radius:3px; flex-shrink:0; }

  .list-wrap{
    flex:1;
    overflow-y:auto;
    padding: 6px 0;
  }
  .line-card{
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .line-card:hover{ background: var(--panel-2); }
  .line-card .row1{
    display:flex; justify-content:space-between; align-items:flex-start; gap:8px;
  }
  .line-card .name{
    font-size: 13px;
    font-weight: 500;
    line-height: 1.35;
  }
  .risk-badge{
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.02em;
    white-space: nowrap;
    flex-shrink:0;
  }
  .line-card .meta{
    margin-top: 5px;
    font-size: 11px;
    color: var(--muted);
    display:flex; gap: 12px;
  }
  .empty, .error{
    padding: 24px 18px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }
  .error{ color: var(--risk-high); }

  .leaflet-popup-content-wrapper{
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .leaflet-popup-tip{ background: var(--panel); }
  .popup-title{ font-weight:600; font-size:13px; margin-bottom:4px; }
  .popup-row{ font-size: 12px; color: var(--muted); margin-top:2px; }
  .popup-row b{ color: var(--text); font-weight:500; }

  .focus-control a{
    width: 26px;
    height: 26px;
    line-height: 26px;
    text-align: center;
    font-size: 15px;
    background: var(--panel);
    color: var(--text);
    display: block;
  }
  .focus-control a:hover{ background: var(--panel-2); }
</style>
</head>
<body>

<header>
  <div class="scan-line"></div>
  <div class="title-block">
    <h1>YEDAŞ Hat Koridoru İzleme</h1>
    <p>Sentinel-2 NDVI tabanlı bitki örtüsü yaklaşma riski</p>
  </div>
  <div class="status-pill">
    <span class="dot"></span>
    <span id="status-text" class="mono">yükleniyor…</span>
  </div>
</header>

<main>
  <div id="map"></div>
  <aside>
    <div class="legend">
      <h2>Risk Seviyesi</h2>
      <div class="legend-row"><span class="swatch" style="background:var(--risk-high)"></span> Yüksek — NDVI ≥ 0.60</div>
      <div class="legend-row"><span class="swatch" style="background:var(--risk-medium)"></span> Orta — NDVI 0.35–0.60</div>
      <div class="legend-row"><span class="swatch" style="background:var(--risk-low)"></span> Düşük — NDVI &lt; 0.35</div>
      <div class="legend-row"><span class="swatch" style="background:var(--risk-unknown)"></span> Veri yok</div>
    </div>
    <div id="list" class="list-wrap">
      <div class="empty">Hatlar yükleniyor…</div>
    </div>
  </aside>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ---------------------------------------------------------------------------
// AYARLAR — Supabase Dashboard → Settings → API sayfasından al
// SUPABASE_ANON_KEY burada tarayıcıda görünür olması GÜVENLİDİR: sadece
// okuma izni veren RLS policy'leri (bkz. supabase_view_power_line_risk_status.sql)
// bu key ile eşleşiyor, yazma/silme yapılamaz.
// ---------------------------------------------------------------------------
const CONFIG = {
  SUPABASE_URL: "https://gusuhktpmaoqaoybfhge.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_A5Labzy3U2u11K_U6OW1nQ_Pp2FdNZH",
};

const RISK_COLORS = {
  high: "#FF4D5E",
  medium: "#FFB020",
  low: "#2FE6A0",
  unknown: "#8FA8B8",
};
const RISK_LABELS = {
  high: "Yüksek risk",
  medium: "Orta risk",
  low: "Düşük risk",
  unknown: "Veri yok",
};
const RISK_ORDER = { high: 0, medium: 1, low: 2, unknown: 3 };

const statusText = document.getElementById("status-text");
const listEl = document.getElementById("list");

// preferCanvas: true -> binlerce hat/segment tek tek SVG DOM elemanı olarak
// çizilmek yerine tek bir <canvas> üzerine render edilir. Türkiye genelinde
// ~15.000 hat olduğunda bu, tarayıcının kilitlenmesini önlemek için kritik.
const map = L.map("map", { zoomControl: true, preferCanvas: true }).setView([41.29, 36.33], 12);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 19,
}).addTo(map);

// Çalışma alanı: fetch_osm_powerlines.py'deki DEFAULT_BBOX ile aynı
// (Samsun kırsalı çevresi). Hat verisi olmadığında ya da haritada
// kaybolduğunda buraya dönmek için kullanılıyor.
const WORK_AREA_BOUNDS = L.latLngBounds([41.20, 36.20], [41.40, 36.50]);

const FocusControl = L.Control.extend({
  options: { position: "topleft" },
  onAdd: function () {
    const container = L.DomUtil.create("div", "leaflet-bar focus-control");
    const link = L.DomUtil.create("a", "", container);
    link.href = "#";
    link.title = "Çalışma alanına odaklan";
    link.innerHTML = "&#8982;"; // hedef/odak simgesi
    L.DomEvent.on(link, "click", (e) => {
      L.DomEvent.stopPropagation(e);
      L.DomEvent.preventDefault(e);
      map.fitBounds(WORK_AREA_BOUNDS, { padding: [30, 30] });
    });
    return container;
  },
});
map.addControl(new FocusControl());

const layerByLineId = {};

function setStatus(text) {
  statusText.textContent = text;
}

function toNum(v) {
  if (v === null || v === undefined || v === "") return null;
  const n = Number(v);
  return Number.isNaN(n) ? null : n;
}

function popupHtml(row) {
  const date = row.measurement_date || "—";
  const ndviNum = toNum(row.ndvi_mean);
  const cloudNum = toNum(row.cloud_cover_pct);
  const ndvi = ndviNum !== null ? ndviNum.toFixed(3) : "—";
  const cloud = cloudNum !== null ? `${cloudNum}%` : "—";
  return `
    <div class="popup-title">${row.line_name}</div>
    <div class="popup-row"><b>${RISK_LABELS[row.risk_level] || "—"}</b></div>
    <div class="popup-row">NDVI ortalama: <b>${ndvi}</b></div>
    <div class="popup-row">Son ölçüm: <b>${date}</b></div>
    <div class="popup-row">Bulut oranı: <b>${cloud}</b></div>
    <div class="popup-row">Gerilim: <b>${row.voltage_level || "—"}</b></div>
  `;
}

function renderList(rows) {
  if (!rows.length) {
    listEl.innerHTML = `<div class="empty">Henüz hat kaydı yok. power_lines tablosuna veri eklendiğinde burada görünecek.</div>`;
    return;
  }

  // NDVI verisi olan (risk_level != unknown) hatları listele; "veri yok"
  // hatlar (henüz otomatik/manuel sorgulanmamış, is_monitored=false olan
  // binlerce hat olabilir) tek tek DOM'a basılmaz, sadece özet gösterilir —
  // aksi halde Türkiye genelinde binlerce satır kenar çubuğunu kilitler.
  const withData = rows.filter(r => r.risk_level !== "unknown");
  const withoutDataCount = rows.length - withData.length;

  const sorted = [...withData].sort((a, b) => (RISK_ORDER[a.risk_level] ?? 9) - (RISK_ORDER[b.risk_level] ?? 9));
  let html = sorted.map(row => `
    <div class="line-card" data-line-id="${row.line_id}">
      <div class="row1">
        <div class="name">${row.line_name}</div>
        <div class="risk-badge" style="background:${RISK_COLORS[row.risk_level]}22; color:${RISK_COLORS[row.risk_level]}">
          ${RISK_LABELS[row.risk_level] || "—"}
        </div>
      </div>
      <div class="meta mono">
        <span>NDVI ${(() => { const n = toNum(row.ndvi_mean); return n !== null ? n.toFixed(2) : "—"; })()}</span>
        <span>${row.measurement_date || "veri yok"}</span>
      </div>
    </div>
  `).join("");

  if (withoutDataCount > 0) {
    html += `<div class="empty">+ ${withoutDataCount} hat için henüz NDVI verisi yok (haritada ince gri çizgi olarak görünür). Otomatik sorguya almak için ilgili hatları is_monitored=true yap (mark_monitored.py), ya da run_pipeline.py --province / --external-ids ile manuel sorgula.</div>`;
  }
  if (!sorted.length && withoutDataCount === 0) {
    html = `<div class="empty">Hiç hat bulunamadı.</div>`;
  }
  listEl.innerHTML = html;

  listEl.querySelectorAll(".line-card").forEach(card => {
    card.addEventListener("click", () => {
      const lineId = card.getAttribute("data-line-id");
      const entry = layerByLineId[lineId];
      if (entry) {
        map.fitBounds(entry.main.getBounds(), { maxZoom: 15, padding: [40, 40] });
        entry.main.openPopup();
      }
    });
  });
}

function renderMap(rows) {
  Object.values(layerByLineId).forEach(entry => map.removeLayer(entry.group));
  const allBounds = [];

  rows.forEach(row => {
    const geojson = row.corridor_geojson || row.line_geojson;
    if (!geojson) return;
    const color = RISK_COLORS[row.risk_level] || RISK_COLORS.unknown;
    const hasData = row.risk_level !== "unknown";
    const group = L.layerGroup();

    // Halo (kılıf) katmanı sadece gerçek NDVI verisi olan hatlarda çizilir.
    // Türkiye genelinde binlerce "veri yok" hattı için halo + dolgulu
    // poligon yerine tek, ince, sade bir çizgi kullanmak render yükünü
    // ciddi şekilde azaltır (bkz. preferCanvas notu yukarıda).
    if (hasData) {
      L.geoJSON(geojson, {
        style: {
          color: "#000000",
          weight: 9,
          opacity: 0.55,
          fillOpacity: 0,
        },
      }).addTo(group);
    }

    const main = L.geoJSON(geojson, {
      style: {
        color: color,
        weight: hasData ? 5 : 2,
        opacity: hasData ? 1 : 0.6,
        fillColor: color,
        fillOpacity: row.corridor_geojson ? 0.35 : 0,
      },
    });
    main.bindPopup(popupHtml(row));
    main.addTo(group);

    group.addTo(map);
    layerByLineId[row.line_id] = { group, main };
    allBounds.push(main.getBounds());
  });

  if (allBounds.length) {
    const combined = allBounds.reduce((acc, b) => acc.extend(b), allBounds[0]);
    map.fitBounds(combined, { padding: [40, 40], maxZoom: 14 });
  } else {
    // Hiç hat yoksa harita boş görünüp "kaybolmasın" diye çalışma alanına odaklan.
    map.fitBounds(WORK_AREA_BOUNDS, { padding: [30, 30] });
  }
}

async function loadData() {
  if (CONFIG.SUPABASE_URL.includes("YOUR-PROJECT")) {
    setStatus("yapılandırılmadı");
    listEl.innerHTML = `<div class="error">CONFIG.SUPABASE_URL / SUPABASE_ANON_KEY henüz ayarlanmadı. index.html içindeki CONFIG bloğunu Supabase Dashboard → Settings → API'daki değerlerle doldur.</div>`;
    return;
  }

  setStatus("yükleniyor…");
  try {
    const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

    // Supabase/PostgREST tek istekte en fazla 1000 satır döner. Türkiye
    // genelinde binlerce hat olduğu için .range() ile sayfalayarak TÜM
    // satırları çekiyoruz, aksi halde harita sadece ilk 1000 hattı
    // (genelde tek bir coğrafi kümeyi) gösterir.
    const PAGE_SIZE = 1000;
    let allRows = [];
    let from = 0;
    while (true) {
      const { data, error } = await client
        .from("power_line_risk_status")
        .select("*")
        .range(from, from + PAGE_SIZE - 1);
      if (error) throw error;
      allRows = allRows.concat(data || []);
      if (!data || data.length < PAGE_SIZE) break;
      from += PAGE_SIZE;
    }

    renderList(allRows);
    renderMap(allRows);
    setStatus(`${allRows.length} hat · güncel`);
  } catch (err) {
    console.error(err);
    setStatus("hata");
    listEl.innerHTML = `<div class="error">Veri çekilemedi: ${err.message || err}. Supabase URL/anon key doğru mu ve power_line_risk_status view'i oluşturuldu mu kontrol et.</div>`;
  }
}

loadData();
</script>
</body>
</html>
